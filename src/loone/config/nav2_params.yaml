# config/nav2_params.yaml
# Minimal nav2 (ROS 2 Humble) parameters for the Loon-E ASV. This is a STARTING
# POINT skeleton -- expect to tune almost everything on the water.
#
# Deliberately NOT here:
#   * amcl / map_server  -> SLAM Toolbox already provides the map and map->odom TF.
#   * robot_state_publisher / controllers -> see bringup.launch.py + ros2_control.yaml.
#
# Frames assumed (see loone_asv.urdf.xacro): global map frame = "map", odom frame =
# "odom", robot base = "base_link". Obstacles come from the "/scan" LaserScan that
# depth_to_laserscan synthesizes from the ZED depth image.
#
# nav2 controller_server publishes geometry_msgs/Twist on /cmd_vel, which thrust_mixer
# consumes. Keep the velocity limits below matched between controller + smoother.

# ----------------------------------------------------------------------------------
bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    # ZED publishes odometry on /<camera_name>/<zed_node_name>/odom. With the
    # slam_launch.py defaults (camera_name=zedx, zed_node_name=zed_node) that is:
    # TODO(team): update if you change those launch args.
    odom_topic: /zedx/zed_node/odom
    bt_loop_duration: 10
    default_server_timeout: 20
    # Leaving default_nav_to_pose_bt_xml unset uses nav2's stock NavigateToPose tree.

# ----------------------------------------------------------------------------------
controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 10.0   # Hz; keep <= thrust_mixer publish_rate (20 Hz)
    min_x_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: progress_checker
    goal_checker_plugins: [general_goal_checker]
    controller_plugins: [FollowPath]

    progress_checker:
      plugin: nav2_controller::SimpleProgressChecker
      required_movement_radius: 0.5
      movement_time_allowance: 10.0

    general_goal_checker:
      plugin: nav2_controller::SimpleGoalChecker
      # TODO(team): boats do not hold a point precisely -- loosen these if it never
      # "arrives", tighten for docking tasks.
      xy_goal_tolerance: 0.5
      yaw_goal_tolerance: 0.5
      stateful: true

    # Regulated Pure Pursuit: smoother path following for a non-holonomic surface
    # craft than DWB. It slows in tight curves and near the goal.
    FollowPath:
      plugin: nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController
      # TODO(team): the single most important tuning block. Start slow.
      desired_linear_vel: 0.5          # m/s cruise speed
      max_linear_accel: 0.5
      max_linear_decel: 0.5
      lookahead_dist: 0.9
      min_lookahead_dist: 0.4
      max_lookahead_dist: 1.5
      use_velocity_scaled_lookahead_dist: true
      # Boats can pivot with differential thrust; allow rotate-to-heading at the start.
      use_rotate_to_heading: true
      rotate_to_heading_angular_vel: 0.6
      max_angular_accel: 0.6
      # Do not command reverse unless your ESCs + mixer support it (props < 0.5).
      allow_reversing: false
      transform_tolerance: 0.2

# ----------------------------------------------------------------------------------
planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 1.0
    planner_plugins: [GridBased]
    # NavFn = Dijkstra/A* over the global costmap. This REPLACES the old hand-rolled
    # path_planning.py. Swap to nav2_smac_planner for kinematically feasible curves.
    GridBased:
      plugin: nav2_navfn_planner/NavfnPlanner
      tolerance: 0.5
      use_astar: true
      allow_unknown: true

# ----------------------------------------------------------------------------------
behavior_server:
  ros__parameters:
    use_sim_time: false
    local_costmap_topic: local_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_costmap_topic: global_costmap/costmap_raw
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: [spin, backup, wait]
    spin:
      plugin: nav2_behaviors/Spin
    backup:
      plugin: nav2_behaviors/BackUp
    wait:
      plugin: nav2_behaviors/Wait
    local_frame: odom
    global_frame: map
    robot_base_frame: base_link
    transform_tolerance: 0.2
    # TODO(team): DriveOnHeading/BackUp assume the vehicle can reverse -- verify or
    # remove them if your propulsion is forward-only.

# ----------------------------------------------------------------------------------
smoother_server:
  ros__parameters:
    use_sim_time: false
    smoother_plugins: [simple_smoother]
    simple_smoother:
      plugin: nav2_smoother::SimpleSmoother
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true

# ----------------------------------------------------------------------------------
velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: OPEN_LOOP
    # [vx, vy, vtheta] -- vy is 0 because the boat cannot move sideways.
    # TODO(team): keep these in sync with controller_server FollowPath limits.
    max_velocity: [0.5, 0.0, 0.6]
    min_velocity: [-0.5, 0.0, -0.6]
    max_accel: [0.5, 0.0, 0.6]
    max_decel: [-0.5, 0.0, -0.6]
    odom_topic: /zedx/zed_node/odom   # must match bt_navigator odom_topic above
    odom_duration: 0.1

# ----------------------------------------------------------------------------------
waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: wait_at_waypoint
    wait_at_waypoint:
      plugin: nav2_waypoint_follower::WaitAtWaypoint
      enabled: true
      waypoint_pause_duration: 0

# ----------------------------------------------------------------------------------
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: map
      robot_base_frame: base_link
      update_frequency: 1.0
      publish_frequency: 1.0
      # TODO(team): replace with the real boat outline (metres, base_link frame).
      # A circular footprint is simplest to start; switch to `footprint` polygon later.
      robot_radius: 0.6
      resolution: 0.05
      track_unknown_space: true
      plugins: [static_layer, obstacle_layer, inflation_layer]
      static_layer:
        plugin: nav2_costmap_2d::StaticLayer
        map_subscribe_transient_local: true   # SLAM Toolbox publishes /map latched
      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: LaserScan
          raytrace_max_range: 10.0
          obstacle_max_range: 8.0
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        cost_scaling_factor: 3.0
        inflation_radius: 0.7   # TODO(team): >= robot_radius + safety margin

# ----------------------------------------------------------------------------------
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: odom
      robot_base_frame: base_link
      update_frequency: 5.0
      publish_frequency: 2.0
      rolling_window: true
      width: 6
      height: 6
      resolution: 0.05
      robot_radius: 0.6
      plugins: [obstacle_layer, inflation_layer]
      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: LaserScan
          raytrace_max_range: 10.0
          obstacle_max_range: 8.0
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        cost_scaling_factor: 3.0
        inflation_radius: 0.7
