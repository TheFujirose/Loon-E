name: Loone Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-motor:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Remove problematic Microsoft repositories
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft*.list
          sudo apt-key adv --keyserver keyserver.ubuntu.com --recv-keys EB3D30B63BE870EE || true
          sudo apt-get update --allow-unauthenticated || sudo apt-get update || true

      - name: Set up ROS 2 Humble
        uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: humble

      - name: Install Python test dependencies
        run: |
          source /opt/ros/humble/setup.bash
          python3 -m pip install --upgrade pip
          python3 -m pip install pytest numpy adafruit-circuitpython-motor adafruit-circuitpython-pca9685

      - name: Install ROS package dependencies
        run: |
          source /opt/ros/humble/setup.bash
          sudo apt-get update
          sudo apt-get install -y \
            ros-humble-navigation2 \
            ros-humble-nav2-bringup \
            ros-humble-turtlebot3-bringup \
            ros-humble-turtlebot3-navigation2 \
            ros-humble-zed-msgs

      - name: Run motor unit tests
        run: |
          source /opt/ros/humble/setup.bash
          export PYTHONPATH="$PYTHONPATH:$GITHUB_WORKSPACE/src/loone:$GITHUB_WORKSPACE/src/loone/test/stubs"
          python3 -m pytest src/loone/test/test_motor.py -v
